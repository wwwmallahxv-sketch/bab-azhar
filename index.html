<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Or et Argent</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Sleek dark background */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Video Grid Container */
        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 4rem;
        }

        /* Responsive Iframe Wrapper */
        .video-card {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }

        .video-card iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* CTA Button Section */
        .cta-section {
            text-align: center;
        }

        .maps-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .maps-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        .maps-btn:active {
            transform: translateY(0);
        }

        /* Footer styling */
        footer {
            margin-top: auto;
            padding-top: 3rem;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Arcade Or et Argent - Qaysariyya Bab Anasy Al-Azhar</h1>
        <p>Regardez les vidéos ci-dessous et trouvez notre emplacement</p>
    </header>

    <main class="video-container">
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/Mx0uZuWhfQU?si=3dsOFaYuKoZZza98" title="Lecteur vidéo YouTube" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/ppKQIVOd9zI?si=xlbI8HTEZh8Py4QL" title="Lecteur vidéo YouTube" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
    </main>

    <section class="cta-section">
        <a href="https://maps.app.goo.gl/LTMMRMK6a9ffe3Rj9" target="_blank" rel="noopener noreferrer" class="maps-btn">
            📍 Voir l'emplacement sur Google Maps
        </a>
    </section>

    <footer>
        &copy; 2026 Votre page de destination
    </footer>

</body>
</html>
